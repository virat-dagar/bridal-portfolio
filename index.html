<!DOCTYPE html>
<html>

<head>
    <title>My Projects</title>
    <style>
        body {
            font-family: sans-serif;
            background: #0f0f0f;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .card {
            display: inline-block;
            margin: 20px;
            padding: 20px 40px;
            border-radius: 12px;
            background: #1c1c1c;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #2a2a2a;
        }

        a {
            text-decoration: none;
            color: white;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h1>🚀 My Demos</h1>

    <div class="card"><a href="./demo1/">Demo 1</a></div>
    <div class="card"><a href="./demo2/">Demo 2</a></div>
    <div class="card"><a href="./demo3/">Demo 3</a></div>

</body>

</html>
